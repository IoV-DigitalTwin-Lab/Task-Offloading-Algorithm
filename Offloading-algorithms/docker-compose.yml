version: "3.9"

services:
  ddqn-agent:
    build: .
    image: iov-ddqn-agent:latest
    environment:
      # Switch between 'db' and 'dummy'
      - ENV_TYPE=db
      # If you need to swap config file name at runtime
      - CONFIG_NAME=db_config.json
    # Mount configs to override DB host, credentials, etc.
    volumes:
      - ./configs:/app/configs:ro
    # Run multiple replicas for parallel processing
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    # Uncomment if the host has NVIDIA runtime and you want GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]
    # healthcheck defined in Dockerfile

  # Optional: local Postgres for testing
  # postgres:
  #   image: postgres:16
  #   environment:
  #     - POSTGRES_DB=iov_db
  #     - POSTGRES_USER=iov_user
  #     - POSTGRES_PASSWORD=iov_password
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
